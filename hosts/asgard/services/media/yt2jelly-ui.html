<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>yt2jelly</title>
  <style>
    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #242424;
      --border:   #333;
      --text:     #e8e8e8;
      --muted:    #888;
      --accent:   #00a4dc;
      --accent2:  #0081b8;
      --success:  #3bba75;
      --danger:   #e05555;
      --r:        10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header-top { display: flex; align-items: center; gap: 12px; }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      letter-spacing: -.3px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-size: 16px;
      padding: 9px 14px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .search-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--r);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      padding: 9px 18px;
      transition: background .15s;
      white-space: nowrap;
    }
    .search-btn:hover  { background: var(--accent2); }
    .search-btn:active { background: var(--accent2); }
    .search-btn:disabled { opacity: .45; cursor: default; }

    /* ── Tabs ──────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 6px;
    }

    .tab {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 5px 14px;
      transition: all .15s;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Main ──────────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 12px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── State messages ────────────────────────────────────────── */
    .msg {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 15px;
      line-height: 1.6;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result cards ──────────────────────────────────────────── */
    #results { display: flex; flex-direction: column; gap: 8px; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, background .1s;
    }
    .result-card:hover  { border-color: #555; }
    .result-card.open   { border-color: var(--accent); }

    .result-top {
      display: flex;
      gap: 10px;
      padding: 10px;
      align-items: flex-start;
    }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 120px; height: 68px;
      background: var(--surface2);
      border-radius: 6px;
      overflow: hidden;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-wrap img[src=""] { display: none; }

    .duration {
      position: absolute;
      bottom: 3px; right: 4px;
      background: rgba(0,0,0,.82);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: .2px;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-channel {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Add panel (expands in-card) ───────────────────────────── */
    .add-panel {
      display: none;
      padding: 0 12px 14px;
    }
    .result-card.open .add-panel { display: block; }

    .add-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .field-row { display: flex; gap: 8px; }

    .field-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .field-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .field-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
      -webkit-appearance: none;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--muted); }

    .panel-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 8px 14px;
      transition: border-color .15s;
    }
    .btn-cancel:hover { border-color: var(--muted); }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 22px;
      transition: background .15s;
    }
    .btn-add:hover    { background: var(--accent2); }
    .btn-add:disabled { opacity: .5; cursor: default; }

    .btn-play {
      background: transparent;
      border: 1px solid #c00;
      border-radius: 6px;
      color: #e55;
      cursor: pointer;
      font-size: 14px;
      padding: 8px 14px;
      transition: background .15s, color .15s;
    }
    .btn-play:hover { background: #c00; color: #fff; }

    .panel-status {
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
    }
    .panel-status.ok  { color: var(--success); }
    .panel-status.err { color: var(--danger); }

    /* ── Inline player ─────────────────────────────────────────── */
    .player-wrap {
      display: none;
      padding: 0 12px 14px;
    }
    .player-wrap.open { display: block; }

    .player-ratio {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      background: #000;
    }
    .player-ratio iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .player-hint {
      margin: 8px 0 0;
      font-size: 0.78rem;
      line-height: 1.35;
      color: var(--muted);
    }
    .player-hint:empty { display: none; }

    /* Audio (background) player — shown by the 🎧 Listen button. */
    .audio-box { display: none; }
    .audio-box.active { display: block; }
    .audio-box audio { width: 100%; display: block; }

    /* ── Jobs ──────────────────────────────────────────────────── */
    #jobs-list { display: flex; flex-direction: column; gap: 8px; }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
    }

    .job-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .job-dot.queued  { background: var(--muted); }
    .job-dot.running { background: var(--accent); animation: pulse 1.2s ease infinite; }
    .job-dot.done    { background: var(--success); }
    .job-dot.failed  { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .job-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .job-badge {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .job-url {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Toast ─────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 11px 20px;
      font-size: 14px;
      white-space: nowrap;
      transition: transform .25s ease;
      z-index: 50;
      pointer-events: none;
    }
    .toast.show      { transform: translateX(-50%) translateY(0); }
    .toast.ok        { border-color: var(--success); color: var(--success); }
    .toast.err       { border-color: var(--danger);  color: var(--danger); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="logo">yt2jelly</span>
    <div class="search-row" id="search-row">
      <input class="search-input" id="q" type="search" placeholder="Artist, song name…" autocomplete="off" autocorrect="off">
      <button class="search-btn" id="search-btn">Search</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('search')">Search</button>
    <button class="tab"        onclick="showTab('jobs')">Jobs</button>
  </div>
</header>

<main>
  <!-- Search pane -->
  <div id="pane-search">
    <div class="msg" id="hint">Search for a song to add it to Jellyfin.</div>
    <div id="results"></div>
  </div>

  <!-- Jobs pane -->
  <div id="pane-jobs" style="display:none">
    <div id="jobs-list"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── Tab switching ─────────────────────────────────────────────
function showTab(name) {
  const isSearch = name === 'search';
  document.getElementById('pane-search').style.display = isSearch ? '' : 'none';
  document.getElementById('pane-jobs').style.display   = isSearch ? 'none' : '';
  document.getElementById('search-row').style.display  = isSearch ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === isSearch);
  });
  if (!isSearch) loadJobs();
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3200);
}

// ── Artist / title heuristic ──────────────────────────────────
function splitArtistTitle(raw) {
  const sep = raw.indexOf(' - ');
  if (sep > 0) return { artist: raw.slice(0, sep).trim(), title: raw.slice(sep + 3).trim() };
  return { artist: '', title: raw.trim() };
}

// ── HTML escaping ─────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Search ───────────────────────────────────────────────────
const qInput   = document.getElementById('q');
const searchBtn = document.getElementById('search-btn');
const hint     = document.getElementById('hint');
const resultsEl = document.getElementById('results');

searchBtn.addEventListener('click', doSearch);
qInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = qInput.value.trim();
  if (!q) return;

  hint.innerHTML = '<span class="spinner"></span>Searching…';
  hint.style.display = '';
  resultsEl.innerHTML = '';
  searchBtn.disabled = true;

  try {
    const res = await fetch('/api/search?' + new URLSearchParams({ q }));
    const data = await res.json();

    if (!res.ok) {
      hint.textContent = data.error || 'Search failed.';
      return;
    }

    hint.style.display = 'none';

    if (!data.results.length) {
      hint.textContent = 'No results found.';
      hint.style.display = '';
      return;
    }

    data.results.forEach((r, idx) => {
      const card = makeCard(r);
      resultsEl.appendChild(card);
      // The top result is the most likely pick — warm it immediately so 🎧
      // Listen on it is near-instant, without needing to open the card first.
      if (idx === 0) prewarmCard(card, r.id);
    });

  } catch {
    hint.textContent = 'Network error. Is yt2jelly-ui running?';
  } finally {
    searchBtn.disabled = false;
  }
}

// Stop every open player (video iframe or audio) across all cards and reset
// their buttons/labels. Called before starting a new one so only one plays.
function stopAllPlayers() {
  document.querySelectorAll('.player-wrap.open').forEach(p => {
    p.classList.remove('open');
    p.querySelector('iframe')?.remove();
    const audio = p.querySelector('audio');
    if (audio) { audio.pause(); audio.removeAttribute('src'); audio.remove(); }
    p.querySelector('.js-audio-box')?.classList.remove('active');
    const hint = p.querySelector('.js-player-hint');
    if (hint) hint.textContent = '';
    const card = p.closest('.result-card');
    const vBtn = card?.querySelector('.js-play');
    if (vBtn) vBtn.textContent = '📺 Video';
    const lBtn = card?.querySelector('.js-listen');
    if (lBtn) lBtn.textContent = '🎧 Listen';
  });
  if ('mediaSession' in navigator) navigator.mediaSession.metadata = null;
}

// Pre-warm a card's audio URL (resolve + cache it server-side) so a later
// 🎧 Listen starts quickly — resolving is the slow part. Fire-and-forget, at
// most once per card.
function prewarmCard(card, videoId) {
  if (card.dataset.prewarmed) return;
  card.dataset.prewarmed = '1';
  fetch(`/api/resolve?id=${encodeURIComponent(videoId)}`).catch(() => {});
}

// ── Result card ───────────────────────────────────────────────
function makeCard(r) {
  const { artist, title } = splitArtistTitle(r.title);

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-top">
      <div class="thumb-wrap">
        <img src="${esc(r.thumbnail)}" alt="" loading="lazy">
        ${r.duration ? `<span class="duration">${esc(r.duration)}</span>` : ''}
      </div>
      <div class="result-info">
        <div class="result-title">${esc(r.title)}</div>
        <div class="result-channel">${esc(r.channel)}</div>
      </div>
    </div>
    <div class="add-panel">
      <hr class="add-divider">
      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Artist</div>
          <input class="field-input js-artist" value="${esc(artist)}" placeholder="Auto-detect">
        </div>
        <div class="field-group">
          <div class="field-label">Title</div>
          <input class="field-input js-title" value="${esc(title)}" placeholder="Auto-detect">
        </div>
      </div>
      <div class="field-row" style="margin-top:8px">
        <div class="field-group">
          <div class="field-label">Album</div>
          <input class="field-input js-album" value="" placeholder="Auto — YouTube album, else Singles">
        </div>
      </div>
      <div class="panel-actions">
        <button class="btn-cancel js-cancel">Cancel</button>
        <button class="btn-play js-play">📺 Video</button>
        <button class="btn-play js-listen">🎧 Listen</button>
        <button class="btn-add js-add">Add to Jellyfin</button>
      </div>
      <div class="panel-status" style="display:none"></div>
    </div>
    <div class="player-wrap js-player-wrap">
      <hr class="add-divider">
      <div class="player-ratio js-player-ratio"></div>
      <div class="audio-box js-audio-box"></div>
      <p class="player-hint js-player-hint"></p>
    </div>
  `;

  // Toggle panel open/closed on top row click
  card.querySelector('.result-top').addEventListener('click', () => {
    const opening = !card.classList.contains('open');
    document.querySelectorAll('.result-card.open').forEach(c => c.classList.remove('open'));
    if (opening) {
      card.classList.add('open');
      card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      prewarmCard(card, r.id);  // warm the URL when the card opens
    }
  });

  card.querySelector('.js-cancel').addEventListener('click', e => {
    e.stopPropagation();
    card.classList.remove('open');
  });

  const playerWrap  = card.querySelector('.js-player-wrap');
  const playerRatio = card.querySelector('.js-player-ratio');
  const audioBox    = card.querySelector('.js-audio-box');
  const playerHint  = card.querySelector('.js-player-hint');
  const playBtn     = card.querySelector('.js-play');
  const listenBtn   = card.querySelector('.js-listen');

  playBtn.addEventListener('click', e => {
    e.stopPropagation();
    const wasPlaying = playerRatio.querySelector('iframe') !== null;
    stopAllPlayers();
    if (!wasPlaying) {
      playerWrap.classList.add('open');
      const iframe = document.createElement('iframe');
      // playsinline=1 keeps it from force-fullscreening on mobile. NOTE: a
      // YouTube embed still pauses when the screen locks / you leave the tab —
      // for true background playback use 🎧 Listen below (own <audio> element).
      iframe.src = `https://www.youtube-nocookie.com/embed/${r.id}?autoplay=1&playsinline=1`;
      iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
      iframe.allowFullscreen = true;
      playerRatio.appendChild(iframe);
      playBtn.textContent = '■ Stop';
      playerHint.textContent = '📺 Video preview — pauses when you lock the screen or leave the tab. Use 🎧 Listen for background playback.';
      card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  });

  // 🎧 Listen — play the audio through an <audio> element this page owns, so
  // the browser keeps it going with the screen off / browser backgrounded and
  // surfaces lock-screen controls via the Media Session API. Audio is streamed
  // from yt2jelly-ui's /api/stream (asgard resolves it with yt-dlp and proxies
  // the bytes), not from YouTube directly — which is what makes this work.
  listenBtn.addEventListener('click', e => {
    e.stopPropagation();
    const existing = audioBox.querySelector('audio');
    const wasPlaying = existing !== null;
    stopAllPlayers();
    if (wasPlaying) return;

    playerWrap.classList.add('open');
    audioBox.classList.add('active');
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.autoplay = true;
    audio.preload = 'none';
    audio.src = `/api/stream?id=${encodeURIComponent(r.id)}`;
    audioBox.appendChild(audio);
    listenBtn.textContent = '■ Stop';
    playerHint.textContent = '🎧 Streaming audio — keeps playing with the screen off or the browser in the background.';

    if ('mediaSession' in navigator) {
      const titleVal  = card.querySelector('.js-title').value.trim()  || r.title;
      const artistVal = card.querySelector('.js-artist').value.trim() || r.channel;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: titleVal,
        artist: artistVal,
        artwork: r.thumbnail ? [{ src: r.thumbnail, sizes: '320x180', type: 'image/jpeg' }] : [],
      });
      navigator.mediaSession.setActionHandler('play',  () => audio.play());
      navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    }

    audio.addEventListener('error', () => {
      playerHint.textContent = '⚠️ Could not stream this track. It may be unavailable — try ▶ Add to Jellyfin instead.';
    });
    audio.play().catch(() => {});
    card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });

  card.querySelector('.js-add').addEventListener('click', async e => {
    e.stopPropagation();
    const addBtn = card.querySelector('.js-add');
    const status = card.querySelector('.panel-status');
    const artistVal = card.querySelector('.js-artist').value.trim();
    const titleVal  = card.querySelector('.js-title').value.trim();
    const albumVal  = card.querySelector('.js-album').value.trim();

    addBtn.disabled = true;
    addBtn.textContent = 'Adding…';
    status.style.display = 'none';

    try {
      const res = await fetch('/api/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: r.url, artist: artistVal, title: titleVal, album: albumVal }),
      });
      const data = await res.json();

      if (res.ok) {
        status.className = 'panel-status ok';
        status.textContent = `✓ Queued as job #${data.job.id}`;
        status.style.display = '';
        addBtn.textContent = 'Queued ✓';
        toast(`Queued: ${titleVal || r.title}`);
      } else {
        throw new Error(data.error || `HTTP ${res.status}`);
      }
    } catch (err) {
      status.className = 'panel-status err';
      status.textContent = `✗ ${err.message}`;
      status.style.display = '';
      addBtn.disabled = false;
      addBtn.textContent = 'Add to Jellyfin';
      toast(err.message, 'err');
    }
  });

  return card;
}

// ── Jobs ──────────────────────────────────────────────────────
async function loadJobs() {
  const el = document.getElementById('jobs-list');
  el.innerHTML = '<div class="msg"><span class="spinner"></span>Loading…</div>';

  try {
    const res = await fetch('/api/jobs');
    const data = await res.json();

    el.innerHTML = '';

    if (!res.ok) {
      el.innerHTML = `<div class="msg">${esc(data.error || 'Error loading jobs.')}</div>`;
      return;
    }

    if (!data.jobs || !data.jobs.length) {
      el.innerHTML = '<div class="msg">No jobs yet.</div>';
      return;
    }

    data.jobs.forEach(j => {
      const card = document.createElement('div');
      card.className = 'job-card';
      const name = [j.artist, j.title].filter(Boolean).join(' – ') || j.url;
      card.innerHTML = `
        <div class="job-top">
          <div class="job-dot ${j.status}"></div>
          <div class="job-name">${esc(name)}</div>
          <div class="job-badge">${esc(j.status)}</div>
        </div>
        <div class="job-url">${esc(j.url)}</div>
      `;
      el.appendChild(card);
    });
  } catch {
    el.innerHTML = '<div class="msg">Failed to load jobs.</div>';
  }
}
</script>

</body>
</html>
